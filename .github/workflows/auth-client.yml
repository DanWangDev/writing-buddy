name: '@labf/auth-client CI & Publish'

on:
  push:
    branches: [main]
    paths:
      - 'packages/auth-client/**'
  pull_request:
    paths:
      - 'packages/auth-client/**'

jobs:
  test:
    name: Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit -p packages/auth-client/tsconfig.json
      - name: Build
        run: npm run build -w packages/auth-client

  publish:
    name: Publish to GitHub Packages
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@labf'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build -w packages/auth-client
      - name: Publish
        working-directory: packages/auth-client
        run: npm publish --access restricted
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
