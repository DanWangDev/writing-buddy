<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Body -->
  <ellipse cx="32" cy="40" rx="18" ry="16" fill="#38BDF8"/>
  <!-- Head -->
  <circle cx="32" cy="22" r="14" fill="#38BDF8"/>
  <!-- Left ear -->
  <path d="M20 12 L16 2 L26 10Z" fill="#38BDF8"/>
  <path d="M21 11 L18 4 L25 10Z" fill="#FFB4A2"/>
  <!-- Right ear -->
  <path d="M44 12 L48 2 L38 10Z" fill="#38BDF8"/>
  <path d="M43 11 L46 4 L39 10Z" fill="#FFB4A2"/>
  <!-- Eyes -->
  <ellipse cx="26" cy="20" rx="3" ry="3.5" fill="white"/>
  <ellipse cx="38" cy="20" rx="3" ry="3.5" fill="white"/>
  <ellipse cx="27" cy="20.5" rx="1.8" ry="2" fill="#1E293B"/>
  <ellipse cx="39" cy="20.5" rx="1.8" ry="2" fill="#1E293B"/>
  <!-- Eye shine -->
  <circle cx="27.8" cy="19.5" r="0.7" fill="white"/>
  <circle cx="39.8" cy="19.5" r="0.7" fill="white"/>
  <!-- Nose -->
  <ellipse cx="32" cy="25" rx="2" ry="1.2" fill="#FFB4A2"/>
  <!-- Mouth -->
  <path d="M29 27 Q32 30 35 27" fill="none" stroke="#1E293B" stroke-width="0.8" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="14" y1="23" x2="25" y2="24" stroke="#1E293B" stroke-width="0.6" opacity="0.4"/>
  <line x1="14" y1="27" x2="25" y2="26" stroke="#1E293B" stroke-width="0.6" opacity="0.4"/>
  <line x1="50" y1="23" x2="39" y2="24" stroke="#1E293B" stroke-width="0.6" opacity="0.4"/>
  <line x1="50" y1="27" x2="39" y2="26" stroke="#1E293B" stroke-width="0.6" opacity="0.4"/>
  <!-- Pencil held in paw -->
  <rect x="42" y="36" width="3" height="18" rx="1" fill="#FBBF24" transform="rotate(-25 43 45)"/>
  <polygon points="42,54 43.5,58 45,54" fill="#1E293B" transform="rotate(-25 43 45)"/>
  <rect x="42" y="36" width="3" height="3" rx="0.5" fill="#FFB4A2" transform="rotate(-25 43 45)"/>
  <!-- Tail -->
  <path d="M14 44 Q6 36 10 28" fill="none" stroke="#38BDF8" stroke-width="4" stroke-linecap="round"/>
</svg>
