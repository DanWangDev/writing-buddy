services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN}
    ports:
      - "5050:5050"
    volumes:
      - db-data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/writing-buddy.db
      - OIDC_ISSUER=${OIDC_ISSUER:-http://localhost:3009}
      - OIDC_INTERNAL_ISSUER=${OIDC_INTERNAL_ISSUER:-http://hub-app:3009}
      - OIDC_REDIRECT_URI=${OIDC_REDIRECT_URI:-http://localhost:5055/api/auth/callback}
      - SESSION_SECRET=${SESSION_SECRET}
      - CORS_ORIGIN=http://localhost:5055,http://localhost:5179
    networks:
      - default
      - hub
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        NODE_AUTH_TOKEN: ${NODE_AUTH_TOKEN}
        VITE_API_URL: /api
    ports:
      - "5055:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  hub:
    external: true
    name: 11plus-hub_default

volumes:
  db-data:
