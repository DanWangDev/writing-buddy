services:
  backend:
    build:
      context: .
      dockerfile: packages/backend/Dockerfile
    ports:
      - "5050:5050"
    volumes:
      - db-data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/writing-buddy.db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
      args:
        VITE_API_URL: /api
    ports:
      - "5055:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
